<!DOCTYPE html>
<html>
<head>
  <title>我的第一个网页</title>
</head>
<body>
  <h1>用户列表</h1>
  <button onclick="loadUsers()">点击加载用户</button>
  <div id="output"></div>

  <script>
    function loadUsers() {
      fetch("https://jsonplaceholder.typicode.com/users")
        .then(response => response.json())
        .then(data => {
          data.forEach(function(item){
            console.log(item.name);
          });
        });
    }
  </script>
</body>
</html>
